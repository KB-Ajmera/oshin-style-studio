<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Jeans — Oshin Sarin</title>
    <!-- Shopify-style meta tags (widget reads these) -->
    <meta property="og:title" content="Indigo Jeans">
    <meta property="og:price:amount" content="6,000">
    <meta property="og:image" content="/api/images/shopify_all/indigo-jeans.jpg">
    <meta property="og:url" content="https://oshinsarin.in/products/indigo-jeans">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #1a1714; }

        .site-header {
            padding: 16px 40px;
            border-bottom: 1px solid #e0d8cc;
            display: flex; justify-content: space-between; align-items: center;
        }
        .site-header .brand {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 500; color: #1a1714;
        }
        .site-header nav { display: flex; gap: 24px; }
        .site-header nav a {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
            color: #7a746b; text-decoration: none; font-weight: 500;
        }
        .site-header nav a:hover { color: #1a1714; }

        .product-page {
            max-width: 1000px; margin: 40px auto; padding: 0 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
        }

        .product-gallery img {
            width: 100%; border-radius: 4px; display: block;
        }

        .product-info { padding-top: 20px; }
        .product-info .breadcrumb {
            font-size: 11px; color: #7a746b; margin-bottom: 16px;
            letter-spacing: 0.04em;
        }
        .product-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px; font-weight: 400; margin-bottom: 10px;
        }
        .product-info .price {
            font-size: 16px; font-weight: 400; color: #1a1714; margin-bottom: 24px;
        }
        .product-info .description {
            font-size: 13px; color: #7a746b; line-height: 1.7; font-weight: 300;
            margin-bottom: 24px;
        }

        .size-selector { margin-bottom: 20px; }
        .size-selector label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
            font-weight: 500; display: block; margin-bottom: 8px;
        }
        .size-selector .sizes { display: flex; gap: 8px; }
        .size-selector .sizes button {
            width: 40px; height: 40px; border: 1px solid #e0d8cc;
            background: white; font-size: 12px; cursor: pointer;
            font-weight: 500; transition: all 0.2s;
        }
        .size-selector .sizes button:hover,
        .size-selector .sizes button.active {
            border-color: #1a1714; background: #1a1714; color: white;
        }

        .product-form__buttons { display: flex; flex-direction: column; gap: 0; }
        .add-to-cart {
            width: 100%; padding: 16px; background: #1a1714; color: white;
            border: none; font-size: 12px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
        }
        .add-to-cart:hover { background: #2a2a2a; }

        @media (max-width: 768px) {
            .product-page { grid-template-columns: 1fr; gap: 24px; padding: 0 20px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">Oshin</div>
        <nav>
            <a href="#">Shop All</a>
            <a href="#">New Arrivals</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="product-page">
        <div class="product-gallery">
            <img src="/api/images/shopify_all/indigo-jeans.jpg" alt="Indigo Jeans">
        </div>

        <div class="product-info">
            <div class="breadcrumb">Home / Shop / Indigo Jeans</div>
            <h1>Indigo Jeans</h1>
            <div class="price">Rs. 6,000</div>
            <div class="description">
                Regular waist &middot; front fly closure &middot; front welt pockets &middot;
                back patch pockets &middot; straight pant leg &middot; relaxed fit
            </div>

            <div class="size-selector">
                <label>Size</label>
                <div class="sizes">
                    <button>XS</button>
                    <button class="active">S</button>
                    <button>M</button>
                    <button>L</button>
                    <button>XL</button>
                    <button>XXL</button>
                </div>
            </div>

            <form action="/cart/add" method="post">
                <div class="product-form__buttons">
                    <button type="submit" class="add-to-cart">Add to Cart</button>
                    <!-- The Try On button will be auto-inserted here by the widget -->
                </div>
            </form>
        </div>
    </div>

    <!-- This is the ONLY thing needed — one script tag -->
    <script src="/widget/tryon-button.js" data-api=""></script>
</body>
</html>
