<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Website — Embed Example</title>
    <style>
        /* This is the CLIENT's own website styles */
        body {
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background: #fafafa;
        }
        .site-header {
            background: #2d3436;
            color: white;
            padding: 20px 40px;
        }
        .site-header h1 { margin: 0; font-size: 22px; }
        .site-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .site-content h2 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        .site-content p {
            color: #636e72;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="site-header">
        <h1>Fashion Store</h1>
    </div>

    <div class="site-content">
        <h2>Try Before You Buy</h2>
        <p>Use our virtual try-on to see how outfits look on you before purchasing!</p>

        <!-- ============================================
             EMBED CODE — This is all the client needs:
             1. A container div
             2. The CSS link
             3. The JS script with data attributes
             ============================================ -->

        <div id="vto-widget"></div>

        <link rel="stylesheet" href="http://localhost:8000/widget/styles.css">
        <script
            src="http://localhost:8000/widget/app.js"
            data-vto-widget
            data-api-base="http://localhost:8000"
            data-mode="quality">
        </script>

        <!-- ============================================ -->

        <p style="margin-top: 40px; font-size: 14px; color: #b2bec3;">
            Powered by Virtual Try-On AI
        </p>
    </div>
</body>
</html>
